kind = "web"
previewPath = "/"
title = "ArenaOS"
version = "1.0.0"
id = "artifacts/arena-os"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22890

[services.development]
run = "pnpm --filter @workspace/arena-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arena-os", "run", "build" ]
serve = "static"
publicDir = "artifacts/arena-os/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22890"
BASE_PATH = "/"
